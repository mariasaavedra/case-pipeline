# nginx config for the web container. Serves the static React bundle and proxies
# API traffic to the `api` service on the compose network — the production
# equivalent of the Vite dev server's `/api` proxy (apps/web/vite.config.ts).

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API + OAuth (everything the server handles lives under /api/*).
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Health probe passthrough (the endpoint lives outside /api by design).
  location = /health {
    proxy_pass http://api:3000/health;
  }

  # SPA fallback — client-side routing serves index.html for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
