# =============================================================================
# Deployment topology — single firm, single host.
#
#   web (nginx)  ──/api──▶  api (Express + tsx)  ──▶  SQLite on a host bind mount
#       :8080                  (internal :3000)         ./data:/app/data
#
# Data lives in ./data next to this file — a deterministic bind mount, NOT a
# named Docker volume. Rationale: a named volume is invisible to the repo and
# detaches silently on a clean redeploy (`git checkout`, fresh clone) → the API
# points at an empty volume and the real live.db / users.db "disappear". A
# relative bind mount is versioned here, identical on every host, and the DB
# files stay visible on disk for backup/inspection. Keep ./data OUT of git
# (it is gitignored) — only this mapping is tracked.
#
# First-time setup (./data starts empty; the API exits if live.db is missing).
# Populate it once before/after first boot:
#   docker compose run --rm api npx tsx scripts/sync/index.ts
# Secrets (MONDAY_API_TOKEN, MONDAY_CLIENT_ID/SECRET, …) come from the host .env
# via env_file and are never baked into the image.
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      - DB_SOURCE=live
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # The ONLY copy of real client data (live.db + users.db). Relative bind
      # mount so git and every host agree and the files never detach on redeploy.
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
