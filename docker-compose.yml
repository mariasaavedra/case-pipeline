# =============================================================================
# Deployment topology — single firm, single host.
#
#   web (nginx)  ──/api──▶  api (Express + tsx)  ──▶  SQLite on a host bind mount
#       :8080                  (internal :3000)         ./data:/app/data
#
# PULL-ONLY. These services reference prebuilt images from GHCR — there is NO
# `build:` here on purpose, so the production server can never trigger a Vite
# build (that OOM-kills the 1 GB droplet). Images are built by GitHub Actions
# (.github/workflows/build-push.yml) on every push to main.
#
# Deploy on the server:
#   git pull && docker compose pull && docker compose up -d
#
# Build images LOCALLY (rarely needed) with the build overlay:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# Data lives in ./data next to this file — a deterministic relative bind mount,
# NOT a named volume, so git and every host agree and the DB files (live.db,
# users.db) never detach on a clean redeploy. Keep ./data OUT of git (gitignored).
#
# First-time setup (./data starts empty; the API exits if live.db is missing):
#   docker compose run --rm api npx tsx scripts/sync/index.ts
# Secrets (MONDAY_API_TOKEN, MONDAY_CLIENT_ID/SECRET, …) come from the host .env
# via env_file and are never baked into the image.
# =============================================================================

services:
  api:
    image: ghcr.io/mariasaavedra/case-pipeline-api:latest
    env_file:
      - .env
    environment:
      - DB_SOURCE=live
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # The ONLY copy of real client data (live.db + users.db). Relative bind
      # mount so git and every host agree and the files never detach on redeploy.
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 15s
    restart: unless-stopped

  web:
    image: ghcr.io/mariasaavedra/case-pipeline-web:latest
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
