name: Build & Push Images

# Build the API and web Docker images on GitHub's runners (x86, plenty of RAM)
# and push them to GitHub Container Registry (GHCR). The production server never
# builds — it only pulls these prebuilt images. This is what keeps the 1 GB
# droplet from OOM-ing on the Vite build.
#
# Deploy on the server after this workflow succeeds:
#   cd ~/case-pipeline-new && git pull && docker compose pull && docker compose up -d

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

env:
  REGISTRY: ghcr.io
  # GHCR image names must be lowercase. Owner = the repo owner.
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/case-pipeline-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/case-pipeline-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the owner (GHCR rejects uppercase); github.repository_owner may
      # contain capitals. Expose ready-to-use image refs to later steps.
      - name: Compute image refs
        id: refs
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "api=${{ env.REGISTRY }}/${owner}/case-pipeline-api" >> "$GITHUB_OUTPUT"
          echo "web=${{ env.REGISTRY }}/${owner}/case-pipeline-web" >> "$GITHUB_OUTPUT"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64 # the droplet is x86_64
          push: true
          tags: |
            ${{ steps.refs.outputs.api }}:latest
            ${{ steps.refs.outputs.api }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.refs.outputs.web }}:latest
            ${{ steps.refs.outputs.web }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
